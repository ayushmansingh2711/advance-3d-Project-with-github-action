name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ayushman2711/gitub-action .

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ayushman2711/gitub-action

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/ayushman2711/gitub-action
            docker stop ayushman2711/gitub-action || true
            docker rm rayushman2711/gitub-action || true
            docker run -d -p 80:80 --name react-app ${{ secrets.DOCKER_USERNAME }}/ayushman2711/gitub-action
